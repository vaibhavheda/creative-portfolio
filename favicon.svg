<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- cream paper -->
  <rect width="32" height="32" rx="7" fill="#f5efdd"/>
  <!-- subtle graph-paper hint -->
  <g stroke="#1a2a48" stroke-width="0.35" opacity="0.14">
    <line x1="0" y1="11" x2="32" y2="11"/>
    <line x1="0" y1="21" x2="32" y2="21"/>
    <line x1="11" y1="0" x2="11" y2="32"/>
    <line x1="21" y1="0" x2="21" y2="32"/>
  </g>
  <!-- red margin rule (like the notebook) -->
  <line x1="4.2" y1="3" x2="4.2" y2="29" stroke="#b93226" stroke-width="0.55" opacity="0.65"/>
  <!-- handwritten V strokes -->
  <path d="M7.5 8 L15.9 22.5 L24.5 8"
        fill="none" stroke="#1a2a48" stroke-width="3.1"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- accent underline, ever so slightly curved -->
  <path d="M5.5 26.8 Q 16 25.9 26.5 27.1"
        fill="none" stroke="#b93226" stroke-width="2.4"
        stroke-linecap="round"/>
</svg>
